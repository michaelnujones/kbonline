<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login Wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg, #0f172a, #1e3a8a);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

/* BOX */
.box{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
padding:40px;
border-radius:15px;
width:350px;
text-align:center;
box-shadow: 0 0 25px rgba(0,0,0,0.5);
border:1px solid rgba(255,255,255,0.1);
}

/* TITLE */
h2{
margin-top:0;
color:#60a5fa;
}

/* INPUT */
input,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
outline:none;
background:#0f172a;
color:white;
border:1px solid rgba(255,255,255,0.1);
transition:0.2s;
}

input:focus,select:focus{
border:1px solid #3b82f6;
box-shadow:0 0 5px #3b82f6;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#3b82f6,#60a5fa);
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 10px #3b82f6;
}

/* REGISTER BUTTON */
.register{
background:linear-gradient(45deg,#1e293b,#334155);
}

.register:hover{
box-shadow:0 0 10px #64748b;
}

/* HIDE */
.hidden{
display:none;
}

/* INPUT GROUP */
.input-group{
position:relative;
}

.input-group span{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
opacity:0.7;
}

.input-group span:hover{
opacity:1;
}

/* ANIMASI MASUK */
.box{
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}


</style>
</head>

<body>

<div class="box">

<!-- LOGIN -->
<div id="loginPage">
<h1 style="color:#3b82f6;margin-bottom:10px;">🎲 DICE GAME</h1>
<h2>Login Akun</h2>

<input id="username" placeholder="Username">

<div class="input-group">
<input id="password" type="password" placeholder="Password" style="padding-right:12px;">
<span onclick="togglePassword('password', this)">👁️</span>
</div>

<button onclick="login()">Login</button>
<button class="register" onclick="showRegister()">Register</button>

</div>


<!-- REGISTER -->
<div id="registerPage" class="hidden">

<h2>Register Akun</h2>

<input id="reg_username" placeholder="Username">

<div class="input-group">
<input id="reg_password" type="password" placeholder="Password" style="padding-right:12px;">
<span onclick="togglePassword('reg_password', this)">👁️</span>
</div>

<div class="input-group">
<input id="confirm_password" type="password" placeholder="Password" style="padding-right:12px;">
<span onclick="togglePassword('confirm_password', this)">👁️</span>
</div>

<input id="email" placeholder="Email" type="email">
<input id="phone" placeholder="No HP">

<select id="bank" >
<option value="" >Pilih Bank / Ewallet</option>

<option>BCA</option>
<option>BRI</option>
<option>BNI</option>
<option>Mandiri</option>
<option>BTN</option>
<option>BSI</option>
<option>CIMB Niaga</option>
<option>Danamon</option>
<option>Permata</option>
<option>Maybank</option>
<option>OCBC NISP</option>
<option>Panin Bank</option>
<option>Bank Mega</option>
<option>Bank Jago</option>
<option>SeaBank</option>
<option>Neo Commerce</option>
<option>Allo Bank</option>

<option>──────── E-WALLET ────────</option>

<option>DANA</option>
<option>OVO</option>
<option>GoPay</option>
<option>ShopeePay</option>
<option>LinkAja</option>
<option>iSaku</option>
<option>Flip</option>
<option>PayPal</option>

</select>

<input id="rekening" placeholder="Nomor Rekening / Nomor Ewallet">
<input id="atasnama" placeholder="Atas Nama Akun Bank / Ewallet">

<button onclick="register()">Daftar</button>
<button onclick="showLogin()">Kembali</button>

</div>

</div>

<script>

/* =========================
   SHOW PAGE
========================= */

function showRegister(){
document.getElementById("loginPage").classList.add("hidden")
document.getElementById("registerPage").classList.remove("hidden")
}

function showLogin(){
document.getElementById("registerPage").classList.add("hidden")
document.getElementById("loginPage").classList.remove("hidden")
}


/* =========================
   TOGGLE PASSWORD
========================= */

function togglePassword(id, el){
const input = document.getElementById(id)

if(input.type === "password"){
input.type = "text"
el.textContent = "🙈"
}else{
input.type = "password"
el.textContent = "👁️"
}
}


/* =========================
   LOGIN
========================= */

async function login(){

const username = document.getElementById("username").value
const password = document.getElementById("password").value

if(!username || !password){
alert("Isi username & password!")
return
}

let res = await fetch("/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username,password})
})

let data = await res.json()

if(data.status==="ok"){

localStorage.setItem("user",username)
localStorage.setItem("role",data.role)

if(data.role === "admin"){
window.location="/pegawai/1611mic.html"
}else{
window.location="dashboard.html"
}

}else{
alert("Login gagal")
}

}


/* =========================
   REGISTER
========================= */

function register(){

const username = document.getElementById("reg_username").value
const password = document.getElementById("reg_password").value
const confirmPassword = document.getElementById("confirm_password").value
const email = document.getElementById("email").value
const phone = document.getElementById("phone").value
const bank = document.getElementById("bank").value
const atasnama = document.getElementById("atasnama").value
const rekening = document.getElementById("rekening").value

// VALIDASI
if(!username || !password || !email){
alert("Data wajib diisi!")
return
}

if(password !== confirmPassword){
alert("Password tidak sama!")
return
}

if(password.length < 6){
alert("Password minimal 6 karakter!")
return
}

fetch("/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
password,
email,
phone,
bank,
atasnama,
rekening
})
})
.then(res=>res.json())
.then(data=>{

if(data.status=="ok"){
alert("Register berhasil")
location.reload()
}else if(data.status=="exist"){
alert("Username sudah digunakan")
}else{
alert("Terjadi error")
}

})
}

</script>

</body>
</html>
